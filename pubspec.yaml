name: yh
description: A new Flutter app for house rental management.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  intl: ^0.19.0
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.2.4
  firebase_storage: ^11.6.0
  image_picker: ^1.0.7
  uuid: ^4.3.3
  provider: ^6.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  http: ^1.1.0
  url_launcher: ^6.1.14
  url_launcher_android: ^6.3.28
  crypto: ^3.0.3
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/yhLogo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/yhLogo.png
    - assets/images/logoText.png
